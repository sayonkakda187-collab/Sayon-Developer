name: news-site build

# Type-check, lint, and compile the Next.js news site on PRs that touch it.
on:
  pull_request:
    paths:
      - "news-site/**"
      - ".github/workflows/news-site-build.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-site
    # No DB connection happens during `prisma generate` (postinstall) or
    # `next build` (all DB-backed routes are force-dynamic), but Prisma needs
    # these env vars to be present. Dummy values are fine — nothing connects.
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/news?schema=public"
      DIRECT_URL: "postgresql://user:password@localhost:5432/news?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: news-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + lint + compile)
        run: npm run build
